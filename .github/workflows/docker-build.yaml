name: App Build
on:
  push:
    branches:
      - openu
    paths:
      - '**'
  pull_request:
    paths:
      - '**'
jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t ashyq-bilim-api apps/api
      - name: Build Web Docker image
        run: docker build -f apps/web/Dockerfile -t ashyq-bilim-web .
